version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: blockcred-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BLOCKCRED_DB_NAME:-blockcred}
      POSTGRES_USER: ${BLOCKCRED_DB_USER:-blockcred}
      POSTGRES_PASSWORD: ${BLOCKCRED_DB_PASSWORD:-blockcred}
    ports:
      - "5432:5432"
    volumes:
      - blockcred_pg_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blockcred-app
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: pilot
      BLOCKCRED_DB_URL: jdbc:postgresql://postgres:5432/${BLOCKCRED_DB_NAME:-blockcred}
      BLOCKCRED_DB_USER: ${BLOCKCRED_DB_USER:-blockcred}
      BLOCKCRED_DB_PASSWORD: ${BLOCKCRED_DB_PASSWORD:-blockcred}
      BLOCKCRED_LEGACY_HEADER_AUTH: ${BLOCKCRED_LEGACY_HEADER_AUTH:-false}
      BLOCKCRED_ADMIN_TOKEN: ${BLOCKCRED_ADMIN_TOKEN}
      BLOCKCRED_ISSUER_TOKEN_ENABLED: ${BLOCKCRED_ISSUER_TOKEN_ENABLED:-false}
      BLOCKCRED_ISSUER_TOKEN: ${BLOCKCRED_ISSUER_TOKEN}
      BLOCKCRED_JWT_ISSUER: ${BLOCKCRED_JWT_ISSUER:-blockcred-staff}
      BLOCKCRED_JWT_ACTIVE_KID: ${BLOCKCRED_JWT_ACTIVE_KID:-v1}
      BLOCKCRED_JWT_ACTIVE_KEY: ${BLOCKCRED_JWT_ACTIVE_KEY}
      BLOCKCRED_JWT_PREVIOUS_KID: ${BLOCKCRED_JWT_PREVIOUS_KID:-}
      BLOCKCRED_JWT_PREVIOUS_KEY: ${BLOCKCRED_JWT_PREVIOUS_KEY:-}
      BLOCKCRED_ACCESS_TOKEN_TTL_MINUTES: ${BLOCKCRED_ACCESS_TOKEN_TTL_MINUTES:-15}
      BLOCKCRED_REFRESH_TOKEN_TTL_DAYS: ${BLOCKCRED_REFRESH_TOKEN_TTL_DAYS:-7}
      BLOCKCRED_AUTH_SEED_ENABLED: ${BLOCKCRED_AUTH_SEED_ENABLED:-true}
      BLOCKCRED_AUTH_SEED_ADMIN_USERNAME: ${BLOCKCRED_AUTH_SEED_ADMIN_USERNAME:-admin}
      BLOCKCRED_AUTH_SEED_ADMIN_EMAIL: ${BLOCKCRED_AUTH_SEED_ADMIN_EMAIL:-admin@blockcred.local}
      BLOCKCRED_AUTH_SEED_ADMIN_DISPLAY_NAME: ${BLOCKCRED_AUTH_SEED_ADMIN_DISPLAY_NAME:-University Admin}
      BLOCKCRED_AUTH_SEED_ADMIN_PASSWORD: ${BLOCKCRED_AUTH_SEED_ADMIN_PASSWORD:-AdminPass#2026}
      BLOCKCRED_AUTH_SEED_ISSUER_USERNAME: ${BLOCKCRED_AUTH_SEED_ISSUER_USERNAME:-issuer}
      BLOCKCRED_AUTH_SEED_ISSUER_EMAIL: ${BLOCKCRED_AUTH_SEED_ISSUER_EMAIL:-issuer@blockcred.local}
      BLOCKCRED_AUTH_SEED_ISSUER_DISPLAY_NAME: ${BLOCKCRED_AUTH_SEED_ISSUER_DISPLAY_NAME:-University Issuer}
      BLOCKCRED_AUTH_SEED_ISSUER_PASSWORD: ${BLOCKCRED_AUTH_SEED_ISSUER_PASSWORD:-IssuerPass#2026}
      BLOCKCRED_PUBLIC_TOKEN_SECRET: ${BLOCKCRED_PUBLIC_TOKEN_SECRET}
      BLOCKCRED_AUDIT_DIGEST_SECRET: ${BLOCKCRED_AUDIT_DIGEST_SECRET}
      BLOCKCRED_WALLET_KEY_SOURCE: ${BLOCKCRED_WALLET_KEY_SOURCE:-ENV}
      BLOCKCRED_WALLET_KEY: ${BLOCKCRED_WALLET_KEY:-}
      BLOCKCRED_WALLET_KEY_FILE: ${BLOCKCRED_WALLET_KEY_FILE:-}

volumes:
  blockcred_pg_data:
