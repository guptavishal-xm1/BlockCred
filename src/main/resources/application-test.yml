spring:
  datasource:
    url: jdbc:h2:mem:blockcred-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

blockcred:
  auth:
    issuer-token-enabled: false
  wallet:
    enabled: true
